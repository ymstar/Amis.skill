<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amis CRUD Demo - 用户管理</title>
  <!-- 引入 Amis 样式 -->
  <link href="https://cdn.jsdelivr.net/npm/amis@6.13.0/lib/themes/cxd.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/amis@6.13.0/lib/helper.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; }
    .mt-20 { margin-top: 20px; }
    .text-center { text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- 引入 Amis SDK -->
  <script src="https://cdn.jsdelivr.net/npm/amis@6.13.0/lib/sdk.js"></script>
  <script>
    // ============================================
    // Mock 数据 - 模拟后端API返回
    // ============================================
    const mockUsers = [
      { id: 1, name: '张三', email: 'zhangsan@example.com', department: 'tech', role: 'admin', status: 'active', createdAt: '2024-01-15 10:30:00', avatar: 'https://i.pravatar.cc/100?u=1' },
      { id: 2, name: '李四', email: 'lisi@example.com', department: 'marketing', role: 'user', status: 'active', createdAt: '2024-02-20 14:20:00', avatar: 'https://i.pravatar.cc/100?u=2' },
      { id: 3, name: '王五', email: 'wangwu@example.com', department: 'operation', role: 'user', status: 'inactive', createdAt: '2024-03-10 09:15:00', avatar: 'https://i.pravatar.cc/100?u=3' },
      { id: 4, name: '赵六', email: 'zhaoliu@example.com', department: 'tech', role: 'user', status: 'active', createdAt: '2024-04-05 16:45:00', avatar: 'https://i.pravatar.cc/100?u=4' },
      { id: 5, name: '钱七', email: 'qianqi@example.com', department: 'finance', role: 'user', status: 'active', createdAt: '2024-05-12 11:00:00', avatar: 'https://i.pravatar.cc/100?u=5' },
      { id: 6, name: '孙八', email: 'sunba@example.com', department: 'tech', role: 'editor', status: 'active', createdAt: '2024-06-18 13:30:00', avatar: 'https://i.pravatar.cc/100?u=6' },
      { id: 7, name: '周九', email: 'zhoujiu@example.com', department: 'marketing', role: 'user', status: 'inactive', createdAt: '2024-07-22 08:00:00', avatar: 'https://i.pravatar.cc/100?u=7' },
      { id: 8, name: '吴十', email: 'wushi@example.com', department: 'operation', role: 'user', status: 'active', createdAt: '2024-08-30 15:20:00', avatar: 'https://i.pravatar.cc/100?u=8' },
      { id: 9, name: '郑十一', email: 'zhengshiyi@example.com', department: 'finance', role: 'admin', status: 'active', createdAt: '2024-09-10 10:00:00', avatar: 'https://i.pravatar.cc/100?u=9' },
      { id: 10, name: '陈十二', email: 'chenshier@example.com', department: 'tech', role: 'user', status: 'active', createdAt: '2024-10-05 14:30:00', avatar: 'https://i.pravatar.cc/100?u=10' }
    ];

    // 部门选项
    const departmentOptions = [
      { label: '技术部', value: 'tech' },
      { label: '市场部', value: 'marketing' },
      { label: '运营部', value: 'operation' },
      { label: '财务部', value: 'finance' }
    ];

    // 角色选项
    const roleOptions = [
      { label: '管理员', value: 'admin' },
      { label: '编辑', value: 'editor' },
      { label: '普通用户', value: 'user' }
    ];

    // ============================================
    // Amis Schema 配置
    // ============================================
    const schema = {
      type: 'page',
      title: '用户管理',
      subTitle: '演示完整的 CRUD 操作',
      // 页面顶部工具栏
      toolbar: [
        {
          type: 'button',
          label: '刷新数据',
          icon: 'fa fa-refresh',
          actionType: 'reload',
          target: 'userCrud'
        }
      ],
      body: {
        type: 'crud',
        name: 'userCrud',
        // 数据 API（这里使用静态数据模拟）
        api: {
          method: 'get',
          url: '/api/users',
          // 模拟数据返回格式
          data: {
            page: '${page}',
            perPage: '${perPage}',
            keywords: '${keywords}',
            department: '${department}',
            status: '${status}'
          },
          // 使用 Adaptor 模拟 API 响应
          adaptor: function(payload, response, api) {
            const reqData = api.data || {};
            const page = parseInt(reqData.page) || 1;
            const perPage = parseInt(reqData.perPage) || 10;
            
            // 模拟筛选
            let filtered = [...mockUsers];
            
            // 关键字搜索
            if (reqData.keywords) {
              const kw = reqData.keywords.toLowerCase();
              filtered = filtered.filter(u => 
                u.name.toLowerCase().includes(kw) || 
                u.email.toLowerCase().includes(kw)
              );
            }
            
            // 部门筛选
            if (reqData.department) {
              filtered = filtered.filter(u => u.department === reqData.department);
            }
            
            // 状态筛选
            if (reqData.status) {
              filtered = filtered.filter(u => u.status === reqData.status);
            }
            
            // 分页
            const total = filtered.length;
            const start = (page - 1) * perPage;
            const items = filtered.slice(start, start + perPage);
            
            return {
              status: 0,
              msg: 'ok',
              data: {
                total: total,
                page: page,
                perPage: perPage,
                items: items
              }
            };
          }
        },
        // 新增 API
        createApi: {
          method: 'post',
          url: '/api/users',
          adaptor: function(payload, response, api) {
            const newUser = JSON.parse(api.body);
            newUser.id = Math.max(...mockUsers.map(u => u.id)) + 1;
            newUser.createdAt = new Date().toLocaleString('zh-CN');
            newUser.avatar = 'https://i.pravatar.cc/100?u=' + newUser.id;
            mockUsers.push(newUser);
            return { status: 0, msg: '新增成功', data: newUser };
          }
        },
        // 更新 API
        updateApi: {
          method: 'put',
          url: '/api/users/${id}',
          adaptor: function(payload, response, api) {
            const updated = JSON.parse(api.body);
            const idx = mockUsers.findIndex(u => u.id === updated.id);
            if (idx !== -1) {
              mockUsers[idx] = { ...mockUsers[idx], ...updated };
            }
            return { status: 0, msg: '更新成功', data: mockUsers[idx] };
          }
        },
        // 删除 API
        deleteApi: {
          method: 'delete',
          url: '/api/users/${id}',
          adaptor: function(payload, response, api) {
            const id = parseInt(api.url.match(/\/api\/users\/(\d+)/)[1]);
            const idx = mockUsers.findIndex(u => u.id === id);
            if (idx !== -1) {
              mockUsers.splice(idx, 1);
            }
            return { status: 0, msg: '删除成功' };
          }
        },
        // 批量删除 API
        bulkDeleteApi: {
          method: 'post',
          url: '/api/users/batch-delete',
          adaptor: function(payload, response, api) {
            const ids = JSON.parse(api.body).ids;
            ids.forEach(id => {
              const idx = mockUsers.findIndex(u => u.id === id);
              if (idx !== -1) mockUsers.splice(idx, 1);
            });
            return { status: 0, msg: '批量删除成功' };
          }
        },
        // 搜索过滤器配置
        filter: {
          title: '搜索条件',
          className: 'm-b-sm',
          mode: 'normal',
          body: [
            {
              type: 'input-text',
              name: 'keywords',
              label: '关键字',
              placeholder: '输入用户名或邮箱搜索',
              clearable: true,
              size: 'md'
            },
            {
              type: 'select',
              name: 'department',
              label: '部门',
              placeholder: '选择部门',
              clearable: true,
              options: departmentOptions,
              size: 'md'
            },
            {
              type: 'select',
              name: 'status',
              label: '状态',
              placeholder: '选择状态',
              clearable: true,
              options: [
                { label: '全部', value: '' },
                { label: '启用', value: 'active' },
                { label: '禁用', value: 'inactive' }
              ],
              size: 'md'
            }
          ],
          actions: [
            {
              type: 'reset',
              label: '重置'
            },
            {
              type: 'submit',
              label: '搜索',
              level: 'primary'
            }
          ]
        },
        // 顶部工具栏
        headerToolbar: [
          {
            type: 'button',
            label: '新增用户',
            icon: 'fa fa-plus',
            actionType: 'dialog',
            level: 'primary',
            dialog: {
              title: '新增用户',
              body: {
                type: 'form',
                mode: 'normal',
                api: 'post:/api/users',
                rules: [
                  // 自定义验证规则示例
                  {
                    rule: 'data.name && data.email',
                    message: '用户名和邮箱不能为空'
                  }
                ],
                body: [
                  {
                    type: 'input-text',
                    name: 'name',
                    label: '用户名',
                    required: true,
                    validations: {
                      minLength: 2,
                      maxLength: 20
                    },
                    validationErrors: {
                      minLength: '用户名至少2个字符',
                      maxLength: '用户名最多20个字符'
                    }
                  },
                  {
                    type: 'input-email',
                    name: 'email',
                    label: '邮箱',
                    required: true,
                    placeholder: '请输入有效邮箱'
                  },
                  {
                    type: 'select',
                    name: 'department',
                    label: '部门',
                    required: true,
                    options: departmentOptions
                  },
                  {
                    type: 'select',
                    name: 'role',
                    label: '角色',
                    required: true,
                    options: roleOptions
                  },
                  {
                    type: 'switch',
                    name: 'status',
                    label: '启用账号',
                    value: true
                  },
                  {
                    type: 'textarea',
                    name: 'remark',
                    label: '备注',
                    placeholder: '可选填写备注信息'
                  }
                ],
                buttons: [
                  {
                    type: 'cancel',
                    label: '取消'
                  },
                  {
                    type: 'submit',
                    label: '提交',
                    level: 'primary'
                  }
                ]
              }
            }
          },
          'bulkActions',
          'filter-toggler',
          'columns-toggler',
          {
            type: 'tpl',
            tpl: '<span class="text-info">共有 ${total} 条数据</span>'
          }
        ],
        // 底部工具栏
        footerToolbar: [
          'pagination',
          'statistics'
        ],
        // 表格列配置
        columns: [
          {
            name: 'id',
            label: 'ID',
            width: 60,
            sortable: true
          },
          {
            name: 'avatar',
            label: '头像',
            width: 80,
            type: 'image',
            imageClassName: 'rounded'
          },
          {
            name: 'name',
            label: '用户名',
            width: 120,
            sortable: true,
            searchable: true
          },
          {
            name: 'email',
            label: '邮箱',
            searchable: true
          },
          {
            name: 'department',
            label: '部门',
            width: 100,
            type: 'mapping',
            map: {
              'tech': '<span class="label label-info">技术部</span>',
              'marketing': '<span class="label label-success">市场部</span>',
              'operation': '<span class="label label-warning">运营部</span>',
              'finance': '<span class="label label-danger">财务部</span>'
            }
          },
          {
            name: 'role',
            label: '角色',
            width: 100,
            type: 'mapping',
            map: {
              'admin': '<span class="label label-danger">管理员</span>',
              'editor': '<span class="label label-primary">编辑</span>',
              'user': '<span>普通用户</span>'
            }
          },
          {
            name: 'status',
            label: '状态',
            width: 80,
            type: 'mapping',
            map: {
              'active': '<span class="text-success">启用</span>',
              'inactive': '<span class="text-muted">禁用</span>'
            }
          },
          {
            name: 'createdAt',
            label: '创建时间',
            width: 160,
            type: 'date',
            format: 'YYYY-MM-DD HH:mm',
            sortable: true
          },
          {
            type: 'operation',
            label: '操作',
            width: 180,
            buttons: [
              {
                type: 'button',
                label: '编辑',
                icon: 'fa fa-edit',
                actionType: 'drawer',
                drawer: {
                  title: '编辑用户',
                  size: 'lg',
                  body: {
                    type: 'form',
                    mode: 'horizontal',
                    api: 'put:/api/users/${id}',
                    body: [
                      {
                        type: 'input-text',
                        name: 'name',
                        label: '用户名',
                        required: true
                      },
                      {
                        type: 'input-email',
                        name: 'email',
                        label: '邮箱',
                        required: true
                      },
                      {
                        type: 'select',
                        name: 'department',
                        label: '部门',
                        required: true,
                        options: departmentOptions
                      },
                      {
                        type: 'select',
                        name: 'role',
                        label: '角色',
                        required: true,
                        options: roleOptions
                      },
                      {
                        type: 'switch',
                        name: 'status',
                        label: '启用账号'
                      },
                      {
                        type: 'textarea',
                        name: 'remark',
                        label: '备注'
                      }
                    ],
                    buttons: [
                      {
                        type: 'cancel',
                        label: '取消'
                      },
                      {
                        type: 'submit',
                        label: '保存',
                        level: 'primary'
                      }
                    ]
                  }
                }
              },
              {
                type: 'button',
                label: '删除',
                icon: 'fa fa-trash',
                actionType: 'ajax',
                api: 'delete:/api/users/${id}',
                confirmText: '确定要删除用户「${name}」吗？删除后无法恢复！',
                level: 'danger'
              }
            ]
          }
        ],
        // 批量操作
        bulkActions: [
          {
            type: 'button',
            label: '批量启用',
            actionType: 'ajax',
            api: 'post:/api/users/batch-status',
            confirmText: '确定要启用选中的 ${count} 个用户吗？',
            level: 'success'
          },
          {
            type: 'button',
            label: '批量禁用',
            actionType: 'ajax',
            api: 'post:/api/users/batch-status',
            confirmText: '确定要禁用选中的 ${count} 个用户吗？',
            level: 'warning'
          },
          {
            type: 'button',
            label: '批量删除',
            actionType: 'ajax',
            api: 'post:/api/users/batch-delete',
            confirmText: '确定要删除选中的 ${count} 个用户吗？此操作不可逆！',
            level: 'danger'
          }
        ],
        // 行选择配置
        primaryField: 'id',
        // 快速保存
        quickSaveApi: 'post:/api/users/batch-edit',
        // 快速编辑
        quickEditApi: 'put:/api/users/${id}',
        // 行内编辑配置
        quickEditEnabled: true,
        // 行高
        rowClassName: 'tr-${index % 2 === 0 ? "bg-light" : ""}'
      }
    };

    // 渲染页面
    amis.embed('#root', schema, {
      // 上下文数据
      data: {
        userName: 'Admin'
      },
      // 回调函数
      onPageChange: function(page, perPage) {
        console.log('分页变更:', page, perPage);
      },
      onQuery: function(query) {
        console.log('查询参数:', query);
      }
    });
  </script>
</body>
</html>
