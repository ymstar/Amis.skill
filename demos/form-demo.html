<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amis Form Demo - 复杂表单</title>
  <!-- 引入 Amis 样式 -->
  <link href="https://cdn.jsdelivr.net/npm/amis@6.13.0/lib/themes/cxd.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/amis@6.13.0/lib/helper.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 20px; background: #f5f6fa; }
    .form-container { max-width: 900px; margin: 0 auto; }
    .section-title { font-size: 16px; font-weight: bold; color: #333; margin: 20px 0 10px; padding-left: 10px; border-left: 3px solid #1890ff; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- 引入 Amis SDK -->
  <script src="https://cdn.jsdelivr.net/npm/amis@6.13.0/lib/sdk.js"></script>
  <script>
    // ============================================
    // Mock 数据和选项
    // ============================================
    
    // 省份数据（级联选择示例）
    const provinceData = [
      { label: '北京市', value: 'beijing', children: [
        { label: '东城区', value: 'dongcheng' },
        { label: '西城区', value: 'xicheng' },
        { label: '朝阳区', value: 'chaoyang' },
        { label: '海淀区', value: 'haidian' },
        { label: '丰台区', value: 'fengtai' }
      ]},
      { label: '上海市', value: 'shanghai', children: [
        { label: '黄浦区', value: 'huangpu' },
        { label: '徐汇区', value: 'xuhui' },
        { label: '静安区', value: 'jing\'an' },
        { label: '浦东新区', value: 'pudong' }
      ]},
      { label: '广东省', value: 'guangdong', children: [
        { label: '广州市', value: 'guangzhou', children: [
          { label: '天河区', value: 'tianhe' },
          { label: '越秀区', value: 'yuexiu' },
          { label: '海珠区', value: 'haizhu' },
          { label: '番禺区', value: 'panyu' }
        ]},
        { label: '深圳市', value: 'shenzhen', children: [
          { label: '福田区', value: 'futian' },
          { label: '南山区', value: 'nanshan' },
          { label: '龙岗区', value: 'longgang' }
        ]}
      ]},
      { label: '浙江省', value: 'zhejiang', children: [
        { label: '杭州市', value: 'hangzhou', children: [
          { label: '西湖区', value: 'xihu' },
          { label: '滨江区', value: 'binjiang' },
          { label: '余杭区', value: 'yuhang' }
        ]},
        { label: '宁波市', value: 'ningbo' }
      ]}
    ];

    // 行业分类
    const industryOptions = [
      { label: '互联网/IT', value: 'it' },
      { label: '金融/银行', value: 'finance' },
      { label: '制造业', value: 'manufacture' },
      { label: '教育/培训', value: 'education' },
      { label: '医疗健康', value: 'health' },
      { label: '零售/电商', value: 'retail' },
      { label: '房地产', value: 'realestate' },
      { label: '其他', value: 'other' }
    ];

    // 公司规模
    const companySizeOptions = [
      { label: '1-50人', value: 'small' },
      { label: '51-200人', value: 'medium' },
      { label: '201-500人', value: 'large' },
      { label: '500人以上', value: 'xlarge' }
    ];

    // 预算范围
    const budgetOptions = [
      { label: '1万以下', value: 'lt1' },
      { label: '1-5万', value: '1-5' },
      { label: '5-10万', value: '5-10' },
      { label: '10-50万', value: '10-50' },
      { label: '50万以上', value: 'gt50' }
    ];

    // 提交状态追踪
    let submitCount = 0;

    // ============================================
    // Amis Schema 配置
    // ============================================
    const schema = {
      type: 'page',
      title: '企业服务申请',
      subTitle: '请填写以下信息，我们将在1-3个工作日内与您联系',
      body: {
        type: 'form',
        name: 'companyForm',
        // 表单提交 API
        api: {
          method: 'post',
          url: '/api/company/apply',
          adaptor: function(payload, response, api) {
            submitCount++;
            console.log('表单数据:', api.body);
            return {
              status: 0,
              msg: '提交成功！您的申请编号：APP' + Date.now().toString().slice(-8),
              data: {
                applicationId: 'APP' + Date.now().toString().slice(-8),
                submitTime: new Date().toLocaleString('zh-CN')
              }
            };
          }
        },
        // 表单验证规则
        rules: [
          // 自定义交叉验证：如果是企业用户，税号必填
          {
            name: 'taxRequired',
            message: '企业用户必须填写税号',
            valid: {
              'type': 'select',
              'taxNo': '!data.type || data.type !== "personal" || data.taxNo'
            }
          }
        ],
        // 表单消息
        messages: {},
        // 提交成功后的回调
        redirect: '/apply/success',
        // 重置配置
        resetAfterSubmit: false,
        // 表单内容
        body: [
          // ==================== 第一部分：基本信息 ====================
          {
            type: 'tpl',
            className: 'section-title',
            tpl: '一、基本信息'
          },
          {
            type: 'grid',
            columns: [
              {
                md: 6,
                body: [
                  {
                    type: 'input-text',
                    name: 'companyName',
                    label: '公司名称',
                    placeholder: '请输入公司全称',
                    required: true,
                    clearable: true,
                    validations: {
                      minLength: 2,
                      maxLength: 50
                    },
                    description: '请填写公司营业执照上的全称'
                  },
                  {
                    type: 'select',
                    name: 'industry',
                    label: '所属行业',
                    placeholder: '请选择所属行业',
                    required: true,
                    options: industryOptions,
                    searchable: true
                  },
                  {
                    type: 'select',
                    name: 'companySize',
                    label: '公司规模',
                    required: true,
                    options: companySizeOptions
                  }
                ]
              },
              {
                md: 6,
                body: [
                  {
                    type: 'input-number',
                    name: 'establishedYear',
                    label: '成立年份',
                    placeholder: '如：2015',
                    min: 1900,
                    max: 2024,
                    precision: 0
                  },
                  {
                    type: 'input-text',
                    name: 'website',
                    label: '公司网站',
                    placeholder: 'https://www.example.com',
                    validations: {
                      isUrl: true
                    },
                    validationErrors: {
                      isUrl: '请输入有效的网址'
                    }
                  },
                  {
                    type: 'input-number',
                    name: 'employeeCount',
                    label: '员工人数',
                    placeholder: '请输入员工人数',
                    min: 1,
                    precision: 0
                  }
                ]
              }
            ]
          },

          // ==================== 第二部分：联系方式 ====================
          {
            type: 'tpl',
            className: 'section-title',
            tpl: '二、联系方式'
          },
          {
            type: 'grid',
            columns: [
              {
                md: 6,
                body: [
                  {
                    type: 'input-text',
                    name: 'contactPerson',
                    label: '联系人姓名',
                    placeholder: '请输入联系人姓名',
                    required: true,
                    clearable: true
                  },
                  {
                    type: 'input-text',
                    name: 'department',
                    label: '所属部门',
                    placeholder: '如：市场部'
                  },
                  {
                    type: 'input-text',
                    name: 'position',
                    label: '职位',
                    placeholder: '如：市场经理'
                  }
                ]
              },
              {
                md: 6,
                body: [
                  {
                    type: 'input-text',
                    name: 'phone',
                    label: '联系电话',
                    placeholder: '请输入手机号或座机',
                    required: true,
                    validations: {
                      isPhoneNumber: true
                    },
                    validationErrors: {
                      isPhoneNumber: '请输入有效的电话号码'
                    }
                  },
                  {
                    type: 'input-email',
                    name: 'email',
                    label: '电子邮箱',
                    placeholder: '请输入邮箱地址',
                    required: true,
                    validations: {
                      isEmail: true
                    },
                    validationErrors: {
                      isEmail: '请输入有效的邮箱地址'
                    }
                  },
                  {
                    type: 'input-text',
                    name: 'wechat',
                    label: '微信号',
                    placeholder: '选填，方便后续沟通'
                  }
                ]
              }
            ]
          },

          // ==================== 第三部分：地址信息（级联选择）====================
          {
            type: 'tpl',
            className: 'section-title',
            tpl: '三、公司地址'
          },
          {
            type: 'grid',
            columns: [
              {
                md: 12,
                body: [
                  {
                    type: 'cascader',
                    name: 'region',
                    label: '所在地区',
                    placeholder: '请选择省市区',
                    required: true,
                    options: provinceData,
                    // 级联选择器配置
                    optionsType: 'tree',
                    showLevels: ['province', 'city', 'district'],
                    // 值格式：province|city|district
                    joinValues: true,
                    delimiter: '|'
                  }
                ]
              },
              {
                md: 12,
                body: [
                  {
                    type: 'textarea',
                    name: 'address',
                    label: '详细地址',
                    placeholder: '请输入街道、门牌号等详细信息',
                    required: true,
                    minRows: 2,
                    maxRows: 4,
                    validations: {
                      minLength: 5,
                      maxLength: 200
                    }
                  }
                ]
              }
            ]
          },

          // ==================== 第四部分：服务需求 ====================
          {
            type: 'tpl',
            className: 'section-title',
            tpl: '四、服务需求'
          },
          {
            type: 'checkbox',
            name: 'services',
            label: '需要的服务（可多选）',
            required: true,
            options: [
              { label: '企业建站', value: 'website' },
              { label: '小程序开发', value: 'miniprogram' },
              { label: 'APP开发', value: 'app' },
              { label: '系统定制', value: 'custom' },
              { label: '运维托管', value: 'hosting' },
              { label: 'UI/UX设计', value: 'design' }
            ],
            checkAll: true,
            multiple: true
          },
          {
            type: 'select',
            name: 'budget',
            label: '预算范围',
            required: true,
            options: budgetOptions,
            placeholder: '请选择预算范围',
            description: '我们将根据预算为您推荐合适的方案'
          },
          {
            type: 'radios',
            name: 'timeline',
            label: '期望工期',
            required: true,
            options: [
              { label: '1个月内', value: '1m' },
              { label: '1-3个月', value: '1-3m' },
              { label: '3-6个月', value: '3-6m' },
              { label: '6个月以上', value: 'gt6m' }
            ],
            inline: true
          },
          {
            type: 'radios',
            name: 'urgency',
            label: '紧急程度',
            options: [
              { label: '常规', value: 'normal' },
              { label: '较急', value: 'urgent' },
              { label: '紧急', value: 'critical' }
            ],
            inline: true,
            value: 'normal'
          },

          // ==================== 第五部分：附加信息 ====================
          {
            type: 'tpl',
            className: 'section-title',
            tpl: '五、附加信息'
          },
          {
            type: 'combo',
            name: 'contacts',
            label: '其他联系人',
            description: '可添加多个联系人，方便我们及时与您沟通',
            multiple: true,
            addable: true,
            editable: true,
            addButtonText: '添加联系人',
            items: [
              {
                type: 'grid',
                columns: [
                  { md: 4, body: [
                    { type: 'input-text', name: 'name', placeholder: '姓名' }
                  ]},
                  { md: 4, body: [
                    { type: 'input-text', name: 'phone', placeholder: '电话' }
                  ]},
                  { md: 4, body: [
                    { type: 'input-text', name: 'position', placeholder: '职位' }
                  ]}
                ]
              }
            ],
            // 初始值
            value: [{ name: '', phone: '', position: '' }]
          },
          {
            type: 'textarea',
            name: 'requirements',
            label: '详细需求描述',
            placeholder: '请详细描述您的需求，包括功能要求、业务流程、期望效果等',
            minRows: 4,
            maxRows: 8,
            validations: {
              minLength: 10
            },
            description: '描述越详细，有助于我们更准确地评估和方案设计'
          },
          {
            type: 'textarea',
            name: 'reference',
            label: '参考案例（选填）',
            placeholder: '如有参考网站或竞品，可以在这里提供链接',
            minRows: 2,
            description: '可以粘贴网址或功能描述'
          },
          {
            type: 'switch',
            name: 'needNDA',
            label: '需要保密协议',
            description: '如需签署保密协议保护您的商业机密，请开启此选项',
            value: false
          },
          {
            type: 'switch',
            name: 'subscribe',
            label: '订阅资讯',
            description: '订阅后可接收产品更新和优惠信息',
            value: true
          },

          // ==================== 第六部分：文件上传 ====================
          {
            type: 'tpl',
            className: 'section-title',
            tpl: '六、资质文件上传'
          },
          {
            type: 'input-file',
            name: 'businessLicense',
            label: '营业执照',
            description: '请上传营业执照副本照片或扫描件，支持 JPG、PNG、PDF 格式',
            accept: '.jpg,.jpeg,.png,.pdf',
            maxSize: 5242880, // 5MB
            // 上传配置
            uploadUrl: '/api/upload',
            // 模拟上传
            receiver: {
              method: 'post',
              url: '/api/upload',
              adaptor: function(payload, response, api) {
                return {
                  status: 0,
                  msg: '上传成功',
                  data: {
                    filename: api.body.get('file')?.name || 'file',
                    url: 'https://picsum.photos/400/300?random=' + Date.now()
                  }
                };
              }
            },
            // 裁剪配置
            crop: true,
            cropRate: 16/9
          },
          {
            type: 'input-file',
            name: 'otherDocs',
            label: '其他资质文件（选填）',
            description: '可上传相关资质证书、授权书等支持文件，最多5个文件',
            accept: '.jpg,.jpeg,.png,.pdf,.doc,.docx',
            maxSize: 10485760, // 10MB
            multiple: true,
            maxLength: 5,
            receiver: {
              method: 'post',
              url: '/api/upload',
              adaptor: function(payload, response, api) {
                return {
                  status: 0,
                  msg: '上传成功',
                  data: {
                    filename: 'document_' + Date.now(),
                    url: 'https://picsum.photos/400/300?random=' + Date.now()
                  }
                };
              }
            }
          },

          // ==================== 提交按钮 ====================
          {
            type: 'divider'
          },
          {
            type: 'flex',
            justify: 'center',
            items: [
              {
                type: 'button',
                label: '重置表单',
                level: 'default',
                actionType: 'reset'
              },
              {
                type: 'button',
                label: '保存草稿',
                level: 'default',
                actionType: 'ajax',
                api: 'post:/api/company/draft',
                confirmText: '确定要保存草稿吗？'
              },
              {
                type: 'submit',
                label: '提交申请',
                level: 'primary',
                actionType: 'submit'
              }
            ]
          }
        ],
        // 表单按钮
        buttons: [] // 使用自定义按钮，禁用默认按钮
      }
    };

    // 渲染页面
    amisRequire('amis/embed').embed('#root', schema, {
      data: {
        // 预填数据示例
        contactPerson: '张三',
        phone: '13800138000',
        email: 'zhangsan@company.com',
        needNDA: false,
        subscribe: true
      }
    });
  </script>
</body>
</html>
